<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>指示メモトレーニング</title>
    <style>
        body {
            margin:0;
            font-family:sans-serif;
            background:linear-gradient(135deg,#1f1c2c,#928dab);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .container {
            width:600px;
            background:rgba(255,255,255,0.1);
            padding:25px;
            border-radius:15px;
            box-shadow:0 8px 16px rgba(0,0,0,0.3);
        }
        h2 {
            text-align:center;
            margin-top:0;
        }
        #problemNo {
            font-weight:bold;
            margin-bottom:15px;
            font-size:18px;
            text-align:center;
        }
        button {
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
        }
        .play { background:#00e6a7; color:#000; }
        .next { background:#3498db; color:white; }
        .copy { background:#f39c12; color:#000; }
        textarea {
            width:100%;
            height:120px;
            margin-top:10px;
            padding:10px;
            border-radius:8px;
            border:none;
            font-size:16px;
            resize:none;
        }
        .count {
            text-align:right;
            font-size:14px;
            margin-top:5px;
        }
        #copyMessage {
            margin-top:10px;
            font-size:14px;
            color:#00ffcc;
            text-align:center;
            display:none;
        }
        select {
            width:100%;
            padding:8px;
            margin-top:10px;
            border-radius:8px;
            border:none;
            font-size:16px;
        }
        #openChatGPT {
            display:block;
            text-align:center;
            margin-top:10px;
            font-size:16px;
            color:#00e6a7;
            text-decoration:underline;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>📝 指示メモトレーニング</h2>
    <div id="problemNo">問題：1</div>

    <select id="speedSelect">
        <option value="0.7">初級：スロー再生</option>
        <option value="1.0" selected>普通：ノーマル再生</option>
    </select>

    <button class="play" onclick="playVoice()">▶ 指示を聞く</button>
    <div class="count">再生：<span id="count">0</span>/3</div>

    <textarea id="memo" placeholder="ここにメモを入力"></textarea>

    <div id="openChatGPT" onclick="openChatGPTTab()">初回クリックでChatGPTを開く</div>

    <button class="copy" id="copyToChatGPT">問題＋メモをコピーしてChatGPTに送信</button>
    <div id="copyMessage">コピーしました！ChatGPTタブに貼り付けて送信してください。</div>
    <button class="next" onclick="nextProblem()">次の問題へ</button>
</div>

<script>
    // 問題データ（音声再生 + 採点用文章）
    let problems = [
        {
            audio:"boss1.mp3",
            text:`今いい?時間ないからまとめて言うね
まず会議室、午後で空いてるとこ押さえてほしいんだけど
できればプロジェクター使えるとこね、それとこの資料。5部コピーして会議用にまとめてホチキスト止めで
あと15時に来客あるから受付お願い多分5部くらい早めに来ると思うからそのつもりで
終わったら声かけて`
        },
        {
            audio:"boss2.mp3",
            text:`急ぎでお願い A社に電話して納期がいつになるか確認してほしい
それと Bさんに明日の打ち合わせを15時からに変更できるか聞いておいて
あとこの書類ざっとでいいから不備ないかチェックお願い`
        },
        {
            audio:"boss3.mp3",
            text:`時間ないからまとめて言うね
まずこのデータいらない行削除して csv で保存して
それとプリンターのトナー切れてるから交換しておいて
あと13時からの会議資料足りてるか確認お願い`
        },
        {
            audio:"boss4.mp3",
            text:`これをお願い倉庫にある在庫数ざっとでいいから確認してメモにまとめて
それとこの封筒宛名書いて3通分発送準備しておいて
あと冷蔵庫のお茶来客用に補充お願い`
        },
        {
            audio:"boss5.mp3",
            text:`さっきの変更なんだけど15時の会議キャンセルになったから会議室の予約はいらない
それと資料は印刷しなくていいから参加者にメールで送っておいて`
        }
    ];

    let count = 0, LIMIT = 3, problemIndex = 0, currentProblem;
    let audioPlayer = new Audio();

    // 配列シャッフル
    function shuffleArray(array){
        for(let i=array.length-1; i>0; i--){
            const j=Math.floor(Math.random()*(i+1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    // 初回ロード時に問題をランダム化
    let shuffledProblems = shuffleArray([...problems]);
    currentProblem = shuffledProblems[0];

    // 音声再生
    function playVoice(){
        if(count>=LIMIT){ alert("再生は3回まで！"); return;}
        count++; 
        document.getElementById("count").innerText=count;
        audioPlayer.pause(); 
        audioPlayer.currentTime=0;
        if(currentProblem.audio) audioPlayer.src=currentProblem.audio;
        const speed = parseFloat(document.getElementById("speedSelect").value);
        audioPlayer.playbackRate = speed;
        audioPlayer.play();
    }

    // 次の問題
    function nextProblem(){
        audioPlayer.pause(); 
        audioPlayer.currentTime=0;
        problemIndex++;
        if(problemIndex >= shuffledProblems.length) problemIndex = 0;
        currentProblem = shuffledProblems[problemIndex];
        document.getElementById("problemNo").innerText="問題："+(problemIndex+1);
        count = 0; 
        document.getElementById("count").innerText=0;
        document.getElementById("memo").value="";
        document.getElementById("copyMessage").style.display="none";
    }

    // ChatGPTコピー
    document.getElementById("copyToChatGPT").addEventListener("click", ()=>{
        const problemText = currentProblem.text;
        const memoText = document.getElementById("memo").value;

        const fullText=`上司指示トレーニングです。

【問題】
${problemText}

【あなたのメモ】
${memoText}

【お願い】
- 上のメモを100点満点で採点してください
- 不足している指示や間違いを指摘してください
- 文章はまったく同じでなくてもいいです要点だけしっかり押さえられてれば
- 良い点や改善点もコメントしてください
- 点数とコメントを必ず書いてください`;

        navigator.clipboard.writeText(fullText).then(()=>{
            document.getElementById("copyMessage").style.display="block";
        }).catch(()=>{
            alert("コピーに失敗しました。ブラウザの許可を確認してください");
        });
    });

    // ChatGPTタブを開く
    let chatGPTWindow = null;
    function openChatGPTTab(){
        if(!chatGPTWindow || chatGPTWindow.closed){
            chatGPTWindow = window.open("https://chat.openai.com/", "_blank");
        } else {
            chatGPTWindow.focus();
        }
    }
</script>

</body>
</html>
